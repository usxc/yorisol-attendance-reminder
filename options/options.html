<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yorisol Attendance Reminder 設定</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <main>
    <header class="page-header">
      <p class="eyebrow">Yorisol Reminder</p>
      <h1>設定</h1>
    </header>

    <section class="card">
      <h2>対象サイト</h2>
      <p id="targetUrl">読み込み中...</p>
      <div class="button-row">
        <button id="openTargetButton" class="primary">ヨリソルを開く</button>
      </div>
    </section>

    <section class="card">
      <h2>時間割JSON</h2>
      <div class="control-row">
        <input id="timetableFile" type="file" accept="application/json,.json" />
        <button id="saveTimetableButton" class="primary">時間割JSONを保存</button>
        <button id="clearTimetableButton" class="danger">時間割JSONを削除</button>
      </div>
      <p id="timetableStatus">未読み込み</p>
    </section>

    <section class="card">
      <h2>通知スケジュール</h2>
      <p class="muted">通知スケジュールは、各授業の開始5分後に作成されます。インストール時・Chrome起動時・時間割JSON保存時・毎日0:05に自動で再作成されます。</p>
      <div class="button-row">
        <button id="rebuildButton" class="primary">通知スケジュールを再作成</button>
        <button id="clearAlarmsButton" class="danger">通知スケジュールを削除</button>
      </div>
      <p id="rebuildStatus"></p>
    </section>

    <section class="card">
      <h2>ログ</h2>
      <div class="button-row">
        <button id="reloadLogsButton">ログ再読み込み</button>
        <button id="clearLogsButton" class="danger">ログ削除</button>
      </div>
      <pre id="logs"></pre>
    </section>
  </main>

  <script type="module" src="options.js"></script>
</body>
</html>
